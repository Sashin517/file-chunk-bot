version: "3.8"

# Use this for LOCAL testing only.
# For production, deploy to Railway using the Dockerfile directly.

services:

  # Telegram Local Bot API Server
  # Unlocks file downloads up to 2GB (default limit is 20MB)
  # Get TELEGRAM_API_ID + TELEGRAM_API_HASH from https://my.telegram.org
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    ports:
      - "8081:8081"
    volumes:
      - bot_api_data:/var/lib/telegram-bot-api

  # The splitter bot
  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LOCAL_SERVER_URL: http://telegram-bot-api:8081
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
      SPLIT_SIZE_MB: ${SPLIT_SIZE_MB:-490}
      DOWNLOAD_DIR: /tmp/tg_splitter
    volumes:
      - /tmp/tg_splitter:/tmp/tg_splitter

volumes:
  bot_api_data:
